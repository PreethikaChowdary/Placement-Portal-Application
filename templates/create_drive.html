{% extends 'base.html' %}

{% block title %}Create Placement Drive{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <h2 class="mb-4">Create New Placement Drive</h2>
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Job Title</label>
                        <input type="text" name="title" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Job Description</label>
                        <textarea name="description" class="form-control" rows="4" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Required Skills</label>
                        <input type="text" name="skills" class="form-control" placeholder="e.g., Python, SQL, React" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Experience Required</label>
                        <input type="text" name="experience" class="form-control" placeholder="e.g., 0-2 years" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Salary Range</label>
                        <input type="text" name="salary" class="form-control" placeholder="e.g., 5-8 LPA" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Eligibility Criteria</label>
                        <input type="text" name="eligibility" class="form-control" placeholder="e.g., B.Tech CSE, CGPA > 7.0" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Application Deadline</label>
                        <input type="date" name="deadline" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Create Drive</button>
                    <a href="{{ url_for('company_dashboard') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
